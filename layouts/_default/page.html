{{ define "main" }}
<div class="post-layout">
    {{ partial "toc.html" . }}
    
    <article class="page">
        <header class="page-header">
            <h1 class="page-title">{{ .Title }}</h1>
        </header>

        <div class="page-content">
            {{ .Content }}
        </div>
    </article>
</div>
{{ end }}
