{{ define "main" }}
<section class="page-header">
    <h1 class="page-title">标签：{{ .Title }}</h1>
</section>

<section class="posts-list">
    {{ range .Paginator.Pages }}
    <article class="post-item">
        <div class="post-meta">
            <time class="post-date">{{ .Date.Format "2006-01-02" }}</time>
        </div>
        <div class="post-content">
            <h2 class="post-title">
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            </h2>
            <div class="post-tags">
                {{ with .Params.categories }}
                {{ range first 1 . }}
                <a href="{{ $.Site.BaseURL }}category/{{ . | urlize }}/" class="tag tag-category">{{ . }}</a>
                {{ end }}
                {{ end }}
            </div>
            <p class="post-excerpt">{{ .Summary | plainify | truncate 150 }}</p>
        </div>
    </article>
    {{ end }}
</section>

{{ partial "pagination.html" . }}
{{ end }}
