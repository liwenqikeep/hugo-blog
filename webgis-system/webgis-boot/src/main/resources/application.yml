server:
  port: 8080

spring:
  application:
    name: webgis-system

  datasource:
    url: jdbc:postgresql://localhost:5432/webgis
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
